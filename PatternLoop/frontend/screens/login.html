<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatternLoop - Login</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <main class="container">

        <!-- Panel izquierdo -->
        <section class="brand-section">

            <div class="brand-card">
                <img src="../images/logo.png" alt="Logo PatternLoop">
            </div>

            <h1>PatternLoop</h1>

            <p>
                Tu sala de estar digital para la creatividad
                hecha a mano.
            </p>

        </section>

        <!-- Panel derecho -->
        <section class="login-section">

            <div class="login-card">

                <h2>Bienvenido de nuevo</h2>

                <p class="subtitle">
                    ¡Estamos felices de verte otra vez!
                </p>

                <form id="loginForm">

                    <div class="input-group">
                        <label for="email">Correo electrónico</label>

                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>

                            <input type="email" id="email" placeholder="hola@ejemplo.com">
                        </div>

                        <small class="error" id="emailError"></small>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>

                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>

                            <input type="password" id="password" placeholder="••••••••">

                            <i class="fa-regular fa-eye eye"></i>
                        </div>

                        <small class="error" id="passwordError"></small>
                    </div>

                    <button type="submit">
                        Iniciar sesión
                        <span>→</span>
                    </button>

                </form>

                <p class="register">
                    ¿No tienes una cuenta?
                    <a href="register.html">Crear cuenta</a>
                </p>

            </div>

        </section>

    </main>
<script src="../js/login.js"></script>
</body>

</html>
