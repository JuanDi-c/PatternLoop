<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Patrón - PatternLoop</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="../css/nuevopatron.css">
</head>
<body>

<header class="header">

    <nav class="navbar container">

        <div class="logo-area">

            <a href="#" class="logo">
                PatternLoop
            </a>
        </div>

             <nav class="nav-links">
                <a href="../index.html">Inicio</a>
                <a href="explorar.html" >Explorar</a>
                <a href="nuevopatron.html" class="active">Publicar</a>
                <a href="perfil.html">Perfil</a>
            </nav>

        <div class="nav-icons">
           
        </div>

    </nav>

</header>


<main class="container">

    <!-- ======================================
                    CABECERA
    ======================================= -->

    <section class="page-header">

        <h1>Publicar Nuevo Patrón</h1>

        <p>
            Comparte tu visión creativa con la comunidad de crochet.
        </p>

    </section>


    <!-- ======================================
                FORMULARIO PRINCIPAL
    ======================================= -->

    <section class="publish-grid">

        <!-- IMAGEN -->
        <div class="upload-column">

            <label class="section-label">
                Fotos del Proyecto
            </label>

            <div class="image-upload" id="imageUpload">

    <input
        type="file"
        id="imagenes"
        accept="image/*"
        multiple
        hidden>

    <i class="fa-regular fa-images"></i>

    <p>
        Haz clic para subir la foto de tu obra maestra final
    </p>

    <span>JPG, PNG hasta 10MB</span>

</div>

<div id="previewImagenes"></div>

        </div>


        <!-- FORM -->
        <div class="form-column">

            <div class="input-group full">
                <label>Título del Patrón</label>
                <input 
                type="text"
                id="titulo"
                placeholder="ej. Cárdigan de Verano de Algodón de Ensueño">
            </div>

            <div class="double-grid">

                <div class="input-group">
                    <label>Categoría</label>

                    <select id="categoria">
                        <option value="Amigurumi">Amigurumi</option>
                        <option value="Ropa">Ropa</option>
                        <option value="Hogar">Hogar</option>
                        <option value="Accesorios">Accesorios</option>
                        <option value="Bebes">Bebes</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Dificultad</label>

                    <select id="dificultad">
                        <option value="Principiante">Principiante</option>
                        <option value="Media">Media</option>
                        <option value="Experto">Experta</option>
                    </select>
                </div>

            <div class="input-group full">
                <label>Descripción</label>

                <textarea id="descripcion" rows="5"></textarea>
            </div>
        </div>



    </section>





    <section class="info-grid">

        <!-- materiales -->
<article class="card-section">

    <div class="section-title">

        <h2>
            <i class="fa-regular fa-folder"></i>
            Materiales y Herramientas
        </h2>

    </div>

    <div id="listaMateriales"></div>

    <div class="material-form">

        <input
            type="text"
            id="materialNombre"
            placeholder="Material">

        <input
            type="text"
            id="materialCantidad"
            placeholder="Cantidad">

        <button
            type="button"
            class="add-btn"
            id="agregarMaterial">

            +

        </button>

    </div>

</article>


        </article>

    </section>


    <!-- ======================================
            PASOS
    ======================================= -->

<section class="steps">

    <div class="steps-title">

        <h2>

            <i class="fa-regular fa-rectangle-list"></i>

            Instrucciones Paso a Paso

        </h2>

    </div>

    <div id="listaPasos"></div>

    <div class="nuevo-paso">

        <textarea
            id="descripcionPaso"
            rows="4"
            placeholder="Describe este paso del patrón..."></textarea>

        <button
            type="button"
            class="publish-btn"
            id="agregarPaso">

            <i class="fa-solid fa-plus"></i>

            Agregar paso

        </button>

    </div>

</section>

 <section class="publish-footer">

    <button
        type="button"
        class="publish-btn"
        id="publicarBtn">

        <i class="fa-solid fa-wand-magic-sparkles"></i>

        Publicar patrón

    </button>

</section>

</main>

<script src="../js/api.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/nuevopatron.js"></script>
</body>
</html>
