<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Detalle del Patrón | PatternLoop</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="../css/detallepatron.css">

</head>

<body>

<header class="header">

    <nav class="navbar container">

        <a href="../index.html" class="logo">
            PatternLoop
        </a>

        <div class="nav-links">

            <a href="../index.html">Inicio</a>
            <a href="explorar.html">Explorar</a>
            <a href="nuevopatron.html">Publicar</a>
            <a href="perfil.html">Perfil</a>

        </div>

    </nav>

</header>

<main class="container">

    <div class="detalle-grid">

        <!-- GALERÍA -->

        <section class="galeria">

            <img
                id="imagenPrincipal"
                class="imagen-principal"
                src=""
                alt="">

            <div
                id="miniaturas"
                class="miniaturas">

            </div>

        </section>

        <!-- INFORMACIÓN -->

        <section class="info">



            <h1 id="titulo"></h1>

            <p class="autor">
                Por
                <strong id="autor"></strong>
            </p>

            <div class="chips">

                <span id="dificultad"></span>

                <span id= "categoria"></span>

            </div>

            <h2>Descripción</h2>

            <p id="descripcion"></p>

            <hr>

            <h2>Materiales</h2>

            <ul id="materiales">

            </ul>

            <hr>

            <h2>Paso a paso</h2>

            <div id="pasos">

            </div>

        </section>

    </div>

</main>

<script src="../js/api.js"></script>
<script src="../js/detallepatron.js"></script>

</body>

</html>
