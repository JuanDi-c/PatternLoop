<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - PatternLoop</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="../css/perfil.css">
</head>

<body>

    <header class="header">
        <nav class="navbar container">

            <div class="left-nav">
                <a href="#" class="logo">PatternLoop</a>
            </div>

            <nav class="nav-links">
                <a href="../index.html">Inicio</a>
                <a href="explorar.html">Explorar</a>
                <a href="nuevopatron.html">Publicar</a>
                <a href="perfil.html" class="active2">Perfil</a>
            </nav>

            <div class="profile-mini">

            </div>
        </nav>
    </header>

    <main class="container">

        <section class="profile-section">

            <div class="profile-info">

                <div class="profile-avatar" id="profileAvatar">
                    U
                </div>

                <h1 id="nombreUsuario">
                    Usuario
                </h1>

                <span class="username" id="correoUsuario">
                    correo@email.com
                </span>

                <div class="stats">

                    <div class="stat">

                        <strong id="cantidadPatrones">
                            0
                        </strong>

                        <span>
                            Patrones publicados
                        </span>

                    </div>

                        <strong id="cantidadFavoritos" style="color: rgba(210, 105, 30, 0);">
                            0
                        </strong>
                        <span style="color: rgba(210, 105, 30, 0);">
                            Favoritos agregados
                        </span>


                </div>

            </div>

        </section>


        <section class="tabs">

            <button class="tab active" id="btnPatrones">

                Mis patrones

            </button>

            <button class="tab" id="btnFavoritos">

                Favoritos

            </button>

        </section>


        <section class="patterns-grid" id="patternsGrid">

        </section>

    </main>

    
    <script src="../js/api.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/perfil.js"></script>
</body>

</html>
