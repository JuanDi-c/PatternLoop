<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Patrones - PatternLoop</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="../css/explorar.css">
</head>
<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="container navbar">

            <div class="logo-container">

                <a href="#" class="logo">
                    PatternLoop
                </a>
            </div>

            <nav class="nav-links">
                <a href="../index.html">Inicio</a>
                <a href="#" class="active">Explorar</a>
                <a href="nuevopatron.html">Publicar</a>
                <a href="perfil.html">Perfil</a>
            </nav>

            <div class="header-actions">
            </div>

        </div>

    </header>

    <!-- ================= MAIN ================= -->

    <main class="container">

        <!-- Título -->
        <section class="hero">

            <h1>Explorar Patrones</h1>

            <!-- Buscador -->
            <div class="search-box">

                <div class="search-input">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    <input
                        type="text"
                        placeholder="Busca patrones para tu próximo proyecto..."
                    >

                </div>

                <button class="search-btn">
                    Buscar
                </button>

            </div>

            <p class="quote">
                "Un punto a tiempo ahorra ciento..."
            </p>

        </section>

        <!-- Filtros -->
        <section class="top-bar">

            <span>
                Mostrando patrones encontrados
            </span>


        </section>

        <!-- Tarjetas -->
        <section class="patterns-grid">

            <!-- CARD -->
            <article class="pattern-card">

                <div class="card-image">

                    <img src="https://via.placeholder.com/400x280"
                         alt="Milo the Yarn Cat">

                    <button class="favorite">
                        <i class="fa-regular fa-heart"></i>
                    </button>

                    <span class="difficulty intermediate">
                        Intermedio
                    </span>

                </div>

                <div class="card-content">

                    <div class="title-row">
                        <h2>Milo the Yarn Cat</h2>
                    </div>

                    <p class="author">
                        por CraftyPaws
                    </p>

                    <div class="tags">
                        <span>Amigurumi</span>
                    </div>

                    <div class="tags2" >
                        <span>Ver patron</span>
                    </div>
                    

                </div>

            </article>

        </section>

    </main>

    <script src="../js/esplorar.js"></script>
</body>
</html>
