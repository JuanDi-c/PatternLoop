<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Patrones - PatternLoop</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="../css/explorar.css">
</head>
<body>

<header class="header">

    <div class="container navbar">

        <div class="logo-container">
            <a href="../index.html" class="logo">
                PatternLoop
            </a>
        </div>

        <nav class="nav-links">
            <a href="../index.html">Inicio</a>
            <a href="#" class="active">Explorar</a>
            <a href="nuevopatron.html">Publicar</a>
            <a href="perfil.html">Perfil</a>
        </nav>

        <div class="header-actions"></div>

    </div>

</header>

<main class="container">

    <section class="hero">

        <h1>Explorar Patrones</h1>

        <div class="search-box">

            <div class="search-input">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    id="busqueda"
                    type="text"
                    placeholder="Busca patrones para tu próximo proyecto..."
                >

            </div>

            <button class="search-btn" id="buscarBtn">
                Buscar
            </button>

        </div>

        <p class="quote">
            "Un punto a tiempo ahorra ciento..."
        </p>

    </section>

    <section class="top-bar">

        <span id="cantidadPatrones">
            Cargando publicaciones...
        </span>

    </section>

    <section class="patterns-grid" id="patternsGrid">

    </section>

</main>

<script src="../js/api.js"></script>
<script src="../js/explorar.js"></script>

</body>
</html>
